services:
  - type: web
    name: qr-event-tracker
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:
      - key: PORT
        value: 10000
      - key: BASE_URL
        sync: false  # Will be set automatically after first deploy
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: true
    # Note: Persistent disk requires a paid Render plan
    # Uncomment below lines if you upgrade to paid plan:
    # disk:
    #   name: qr-data
    #   mountPath: /var/data
    #   sizeGB: 1